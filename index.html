  // Renderizado
  function renderProducts(categoryFilter) {
    const grid = document.getElementById('productsGrid');
    let filtered = categoryFilter === 'all' ? productsData : productsData.filter(p => p.categoria === categoryFilter);
    
    if (filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ Pronto más productos. Consulta por WhatsApp.</div>`;
      return;
    }
    
    const whatsappNumber = "593958806224";
    
    grid.innerHTML = filtered.map(prod => {
      const imgUrl = getProductImage(prod.codigo, prod.categoria);
      const msg = `Hola%2C%20quiero%20informaci%C3%B3n%20de%20${encodeURIComponent(prod.nombre)}%20(cod:%20${prod.codigo})`;
      const waLink = `https://wa.me/${whatsappNumber}?text=${msg}`;
      
      let categoryText = "";
      if (prod.categoria === 'TELEFONOS CELULARES Y TABLETS') categoryText = "📱 Celular/Tablet";
      else if (prod.categoria === 'TELEVISORES') categoryText = "📺 Televisor/Monitor";
      else categoryText = "🎵 Audio";
      
      return `
        <div class="product-card">
          <div class="card-img">
            <img src="${imgUrl}" alt="${prod.nombre}" loading="lazy" onerror="this.src='https://i.imgur.com/0kLpRtY.png'">
          </div>
          <div class="card-content">
            <span class="category-label">${categoryText}</span>
            <div class="product-title">${prod.nombre}</div>
            <div class="product-specs">${prod.especs.substring(0, 110)}${prod.especs.length > 110 ? '…' : ''}</div>
            <div class="code"><i class="fas fa-barcode"></i> Código: ${prod.codigo} | Garantía: ${prod.garantia}</div>
            <div class="price-row">
              <span class="price">$${prod.precio.toFixed(2)} <small>USD</small></span>
            </div>
            <div class="buy-action">
              <a href="${waLink}" target="_blank">
                <i class="fab fa-whatsapp"></i> Consultar / Comprar
              </a>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Tabs
  const tabs = document.querySelectorAll('.tab-btn');
  function setActiveTab(activeCat) {
    tabs.forEach(btn => {
      const catValue = btn.getAttribute('data-cat');
      if ((activeCat === 'all' && catValue === 'all') || (catValue === activeCat)) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }
  
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      renderProducts(btn.getAttribute('data-cat'));
      setActiveTab(btn.getAttribute('data-cat'));
    });
  });
  
  renderProducts('all');
</script>
